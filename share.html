<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadWrite</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/style.css?v=59">
</head>
<body>
  <div id="share-view">
    <div id="share-loading" class="sp-loading">Loading…</div>

    <div id="share-error" hidden class="sp-error">
      This note is not available. It may have been unpublished or the link is invalid.
    </div>

    <div id="share-auth-wall" hidden class="sp-auth-wall">
      <p class="sp-auth-prompt">Sign in to view this note.</p>
      <div id="clerk-share-sign-in"></div>
    </div>

    <div class="sp-corner-btns">
      <div id="sp-vis-status" class="sp-vis-status" hidden></div>
      <button id="sp-share-btn" class="sp-share-btn" hidden aria-label="Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
      </button>
      <a id="sp-list-btn" href="#" class="sp-edit-btn" hidden aria-label="Published list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </a>
      <a id="sp-edit-btn" href="#" class="sp-edit-btn" hidden aria-label="Edit note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
             stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </a>
      <a href="/" class="sp-corner-btn" id="sp-home-btn" hidden aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
    </div>

    <div id="share-content" hidden>
      <div id="sp-logo-top" class="sp-logo" hidden>
        <a id="sp-logo-top-a" href="/" class="sp-logo-link">Read<span>Write</span></a>
      </div>

      <header class="sp-header">
        <h1 id="share-title" class="sp-title"></h1>
        <p id="share-date" class="sp-date" hidden></p>
      </header>

      <main class="sp-body">
        <div id="share-images-top" class="sp-images" hidden></div>

        <section id="share-summary-section" hidden>
          <h2 id="share-summary-heading" class="sp-section-title">Summary</h2>
          <div id="share-summary-text" class="sp-text"></div>
        </section>

        <div id="share-images-after-summary" class="sp-images" hidden></div>

        <section id="share-transcription-section" hidden>
          <h2 id="share-transcription-heading" class="sp-section-title">Full Transcription</h2>
          <div id="share-transcription-text" class="sp-text"></div>
        </section>

        <div id="share-images-after-transcription" class="sp-images" hidden></div>

        <section id="share-additional-section" hidden>
          <h2 id="share-additional-heading" class="sp-section-title">Additional Notes</h2>
          <div id="share-additional-text" class="sp-text"></div>
        </section>

        <div id="share-images-bottom" class="sp-images" hidden></div>
      </main>

      <footer class="sp-footer">
        <a id="share-home-link" href="/" class="sp-home-link" hidden>Home</a>
        <div id="sp-logo-bottom" class="sp-logo" hidden>
          <a id="sp-logo-bottom-a" href="/" class="sp-logo-link">Read<span>Write</span></a>
        </div>
      </footer>
    </div>
  </div>

  <div id="share-lightbox" class="lightbox" hidden>
    <button class="lb-close" aria-label="Close">&#10005;</button>
    <button class="lb-prev" aria-label="Previous">&#8592;</button>
    <img id="share-lightbox-img" src="" alt="">
    <button class="lb-next" aria-label="Next">&#8594;</button>
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsucmVhZHdyaXRlLnBob3RvJA"
    src="https://clerk.readwrite.photo/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="/app.js?v=72"></script>
</body>
</html>
