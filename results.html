<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadWrite — Results</title>
  <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">← Back</a>

    <header>
      <a href="index.html" class="logo">Read<span>Write</span></a>
    </header>

    <div id="note-meta" hidden>
      <div class="note-meta-row">
        <h1 id="note-title" class="note-title"></h1>
        <button class="btn-edit" data-section="note-title">Edit</button>
      </div>
      <div class="note-meta-row">
        <div id="note-date" class="note-date"></div>
        <button class="btn-edit" data-section="note-date">Edit</button>
      </div>
    </div>

    <section id="images-section" hidden>
      <details open>
        <summary class="images-toggle">Scanned Images</summary>
        <div id="image-strip" class="image-strip"></div>
      </details>
    </section>

    <div class="card" id="summary-card">
      <div class="section-title">✨ Summary <button class="btn-edit" data-section="summary">Edit</button></div>
      <div class="result-text" id="summary-text"></div>
      <div id="additional-notes-section" hidden>
        <hr class="notes-divider">
        <div class="section-subtitle">Additional Notes</div>
        <div class="result-text" id="additional-notes-text"></div>
      </div>
    </div>

    <div class="card" id="transcription-card">
      <div class="section-title">📝 Full Transcription <button class="btn-edit" data-section="transcription">Edit</button></div>
      <div class="result-text" id="transcription-text"></div>
    </div>

    <div class="card" id="share-card">
      <div class="section-title">⬆ Share</div>
      <div class="share-options">
        <label id="share-title-label"><input type="checkbox" id="share-title" checked> Title</label>
        <label id="share-date-label"><input type="checkbox" id="share-date" checked> Date</label>
        <label id="share-image-label" hidden><input type="checkbox" id="share-image"> Image(s)</label>
        <label id="share-summary-label"><input type="checkbox" id="share-summary" checked> Summary</label>
        <label id="share-transcription-label"><input type="checkbox" id="share-transcription" checked> Transcription</label>
      </div>
      <button class="btn-share" id="share-btn">⬆ Share</button>
    </div>

    <div class="copied-msg" id="copied-msg"></div>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" src="" alt="Full size">
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Z2xhZC1jbGFtLTQyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://glad-clam-42.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="app.js?v=14"></script>
</body>
</html>
