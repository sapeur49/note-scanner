<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadWrite — Results</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <link rel="stylesheet" href="style.css?v=54">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div id="site-nav">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="nav-menu" id="nav-menu" hidden>
          <a href="help.html" class="nav-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Help
          </a>
          <a href="settings.html" class="nav-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
          <button class="nav-menu-item nav-signout" id="btn-signout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign out
          </button>
        </div>
      </div>
      <a href="index.html" class="logo">Read<span>Write</span></a>
      <div class="header-right">
        <a href="notebooks.html" class="hdr-icon-btn" aria-label="Notebooks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </a>
        <a href="notes.html" class="hdr-icon-btn" aria-label="My Notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </a>
        <a href="index.html" class="hdr-icon-btn" aria-label="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </a>
      </div>
    </header>

    <div id="note-meta" hidden>
      <div class="note-meta-row">
        <h1 id="note-title" class="note-title"></h1>
        <button class="btn-edit" data-section="note-title">Edit</button>
      </div>
      <div class="note-meta-row">
        <div id="note-date" class="note-date"></div>
        <button class="btn-edit" data-section="note-date">Edit</button>
      </div>
    </div>

    <section id="images-section" hidden>
      <details open>
        <summary class="images-toggle">Images</summary>
        <div id="image-strip" class="image-strip"></div>
        <div id="add-images-row" hidden>
          <label class="btn-add-images" for="add-images-input">+ Add images</label>
          <input type="file" id="add-images-input" accept="image/*,application/pdf" multiple style="display:none">
          <span id="add-images-status" class="add-images-status"></span>
        </div>
      </details>
    </section>

    <div class="card" id="summary-card">
      <div class="section-title">
        <svg class="icon"><use href="#icon-sparkle"/></svg> Summary
        <button class="btn-edit" data-section="summary">Edit</button>
      </div>
      <div class="result-text" id="summary-text"></div>
    </div>

    <div class="card" id="transcription-card">
      <div class="section-title">
        <svg class="icon"><use href="#icon-align-left"/></svg> Full Transcription
        <button class="btn-edit" data-section="transcription">Edit</button>
      </div>
      <div class="result-text" id="transcription-text"></div>
    </div>

    <div class="card" id="additional-notes-card" hidden>
      <div class="section-title">
        <svg class="icon"><use href="#icon-sparkle"/></svg> Additional Notes
        <button class="btn-edit" data-section="additional-notes">Edit</button>
      </div>
      <div class="result-text" id="additional-notes-text"></div>
    </div>

    <div class="card" id="share-card">
      <div class="section-title">
        <svg class="icon"><use href="#icon-share-2"/></svg> Share
      </div>
      <div class="share-options">
        <label id="share-title-label"><input type="checkbox" id="share-title" checked> Title</label>
        <label id="share-date-label"><input type="checkbox" id="share-date" checked> Date</label>
        <label id="share-image-label" hidden><input type="checkbox" id="share-image"> Image(s)</label>
        <label id="share-summary-label"><input type="checkbox" id="share-summary" checked> Summary</label>
        <label id="share-transcription-label"><input type="checkbox" id="share-transcription" checked> Transcription</label>
        <label id="share-additional-label"><input type="checkbox" id="share-additional" checked> Additional Notes</label>
      </div>
      <button class="btn-share" id="share-btn">
        <svg class="icon"><use href="#icon-share-2"/></svg> Share
      </button>
    </div>

    <div class="card" id="publish-card" hidden>
      <div class="section-title">
        <svg class="icon"><use href="#icon-link"/></svg> Publish Page
      </div>
      <div class="pub-options" id="pub-options">
        <div class="pub-opt-group">
          <div class="pub-opt-label">Include</div>
          <div class="pub-opt-checks">
            <label><input type="checkbox" id="pub-images" checked> Images</label>
            <label><input type="checkbox" id="pub-section-titles" checked> Section Titles</label>
            <label><input type="checkbox" id="pub-summary" checked> Summary</label>
            <label><input type="checkbox" id="pub-transcription" checked> Transcription</label>
            <label><input type="checkbox" id="pub-additional" checked> Additional Notes</label>
            <label><input type="checkbox" id="pub-in-list" checked> Include in published list</label>
          </div>
        </div>
        <div class="pub-opt-group">
          <div class="pub-opt-label">Image Position</div>
          <div class="pub-opt-radios">
            <label><input type="radio" name="pub-img-pos" value="top" checked> Top</label>
            <label><input type="radio" name="pub-img-pos" value="after-summary"> After Summary</label>
            <label><input type="radio" name="pub-img-pos" value="after-transcription"> After Transcription</label>
            <label><input type="radio" name="pub-img-pos" value="bottom"> Bottom</label>
          </div>
        </div>
        <div class="pub-opt-group">
          <div class="pub-opt-label">Visibility</div>
          <select id="pub-visibility" class="pub-visibility-select">
            <option value="public">Public — anyone with the link</option>
            <option value="logged_in">Logged in — signed-in users only</option>
            <option value="me" selected>Me only — only you</option>
          </select>
        </div>
        <div class="pub-opt-group">
          <div class="pub-opt-label">URL slug</div>
          <input type="text" id="pub-slug" class="pub-slug-input" placeholder="auto-generated from title" autocomplete="off" spellcheck="false">
          <div id="pub-slug-preview" class="pub-slug-preview"></div>
        </div>
      </div>
      <div id="share-link-row" hidden>
        <a id="share-link-a" href="#" class="share-link-display"></a>
        <span id="share-unpublished-label" class="share-unpublished-label" hidden>Currently unpublished — URL is saved</span>
      </div>
      <div class="pub-actions">
        <button class="btn-save" id="publish-btn">
          <svg class="icon"><use href="#icon-link"/></svg> Publish
        </button>
        <button class="btn-outline" id="pub-edit-options-btn" hidden>Edit options</button>
        <button class="btn-save" id="pub-save-options-btn" hidden>Save options</button>
        <button class="btn-outline" id="republish-btn" hidden>Republish</button>
        <button class="btn-outline" id="unpublish-btn" hidden>
          <svg class="icon"><use href="#icon-link-off"/></svg> Unpublish
        </button>
      </div>
    </div>

    <div class="card" id="notebooks-card" hidden>
      <div class="section-title">
        <svg class="icon"><use href="#icon-library"/></svg> Notebooks
      </div>
      <div id="notebooks-picker-list" class="notebooks-picker-list"></div>
      <div id="notebooks-empty-msg" class="notebooks-empty-msg" hidden>
        No notebooks yet. <a href="notebooks.html">Create one</a> to start organizing.
      </div>
    </div>

    <div class="note-actions" id="note-actions">
      <button class="btn-save" id="save-btn">
        <svg class="icon"><use href="#icon-save"/></svg> Save Note
      </button>
      <button class="btn-outline" id="update-btn" hidden>
        <svg class="icon"><use href="#icon-check"/></svg> Save edits
      </button>
      <button class="btn-danger" id="delete-btn" hidden>
        <svg class="icon"><use href="#icon-trash-2"/></svg> Delete
      </button>
    </div>

    <div class="copied-msg" id="copied-msg"></div>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" aria-label="Close">&#10005;</button>
    <button class="lb-prev" aria-label="Previous">&#8592;</button>
    <img id="lightbox-img" src="" alt="Full size">
    <button class="lb-next" aria-label="Next">&#8594;</button>
  </div>

  <svg hidden xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5"/>
      <polyline points="12 19 5 12 12 5"/>
    </symbol>
    <symbol id="icon-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/>
      <path d="M5 3l.7 2 2 .7-2 .7L5 9l-.7-2-2-.7 2-.7z"/>
      <path d="M19 15l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z"/>
    </symbol>
    <symbol id="icon-align-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <line x1="17" y1="10" x2="3" y2="10"/>
      <line x1="21" y1="6" x2="3" y2="6"/>
      <line x1="21" y1="14" x2="3" y2="14"/>
      <line x1="13" y1="18" x2="3" y2="18"/>
    </symbol>
    <symbol id="icon-share-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </symbol>
    <symbol id="icon-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>
    <symbol id="icon-trash-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      <line x1="10" y1="11" x2="10" y2="17"/>
      <line x1="14" y1="11" x2="14" y2="17"/>
    </symbol>
    <symbol id="icon-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </symbol>
    <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </symbol>
    <symbol id="icon-link-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 17H7a5 5 0 0 1 0-10h2"/>
      <path d="M15 7h2a5 5 0 0 1 4.9 6"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    </symbol>
    <symbol id="icon-library" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </symbol>
  </svg>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsucmVhZHdyaXRlLnBob3RvJA"
    src="https://clerk.readwrite.photo/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script src="app.js?v=65"></script>
</body>
</html>
