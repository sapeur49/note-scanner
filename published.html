<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published Notes</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/style.css?v=63">
</head>
<body>
  <div id="pub-nav-btns" class="pub-nav-btns" hidden>
    <a href="/notebooks.html" class="sp-corner-btn" aria-label="Notebooks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </a>
    <a href="/notes.html" class="sp-corner-btn" aria-label="My Notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </a>
    <a href="/" class="sp-corner-btn" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </a>
  </div>

  <div id="published-view">
    <div id="pub-loading" class="sp-loading">Loading…</div>

    <div id="pub-error" hidden class="sp-error">
      This list is not available. It may be private or the link is invalid.
    </div>

    <div id="pub-content" hidden>
      <div id="pub-logo-top" class="sp-logo" hidden>
        <a id="pub-logo-top-a" href="#" class="sp-logo-link">Read<span>Write</span></a>
      </div>

      <header class="sp-header">
        <h1 id="pub-list-title" class="sp-title">Published Notes</h1>
      </header>

      <main class="sp-body pub-body">
        <div id="pub-vis-filter" class="pub-vis-filter" hidden>
          <button class="pub-vis-btn pub-vis-active" data-vis="">All</button>
          <button class="pub-vis-btn" data-vis="public" title="Public">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
          </button>
          <button class="pub-vis-btn" data-vis="logged_in" title="Members only">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <button class="pub-vis-btn" data-vis="me" title="Private">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <input type="search" id="pub-search" class="notes-search" placeholder="Search title, summary…" autocomplete="off">
        <select id="pub-notebook-filter" class="notes-notebook-filter" hidden>
          <option value="">All notebooks</option>
        </select>
        <div id="pub-notes-list" class="pub-card-grid"></div>
        <div id="pub-notes-empty" class="notes-empty" hidden>No published notes yet.</div>
      </main>

      <footer class="sp-footer">
        <div id="pub-logo-bottom" class="sp-logo" hidden>
          <a id="pub-logo-bottom-a" href="#" class="sp-logo-link">Read<span>Write</span></a>
        </div>
      </footer>
    </div>
  </div>

  <!-- Clerk loaded for owner detection; non-owners are unaffected -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsucmVhZHdyaXRlLnBob3RvJA"
    src="https://clerk.readwrite.photo/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="/app.js?v=80"></script>
</body>
</html>
