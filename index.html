<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadWrite — Nifty Little Scanner</title>
  <link rel="stylesheet" href="style.css?v=23">
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="logo">Read<span>Write</span></a>
      <div class="tagline">nifty little scanner</div>
    </header>

    <!-- Sign-in wall -->
    <div id="sign-in-wall" hidden>
      <div id="clerk-sign-in"></div>
    </div>

    <!-- App (shown when signed in) -->
    <div id="app" hidden>
      <div class="user-row">
        <span id="user-email" class="user-email"></span>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>

      <div class="top-nav-row">
        <a href="notes.html" class="btn-mynotes" id="btn-mynotes">
          <svg class="icon"><use href="#icon-library"/></svg> My Notes
        </a>
        <a href="settings.html" class="btn-settings" id="btn-settings">
          <svg class="icon"><use href="#icon-settings"/></svg> Settings
        </a>
      </div>

      <div class="card">
        <div class="card-label">Scan notes &amp; documents</div>
        <div class="upload-zone" id="drop-zone">
          <p>Drag &amp; drop images or PDFs here, or use buttons below</p>
          <p style="margin-top:4px"><strong>Multiple files supported</strong></p>
          <div class="input-buttons">
            <button class="btn-outline" id="btn-files">
              <svg class="icon"><use href="#icon-folder-open"/></svg> Choose Files
            </button>
            <button class="btn-outline" id="btn-camera">
              <svg class="icon"><use href="#icon-camera"/></svg> Camera
            </button>
          </div>
        </div>
        <input type="file" id="file-input" accept="image/*,application/pdf" multiple hidden>
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <div id="file-count" style="margin-top:10px;font-size:0.875rem;color:var(--text-muted);text-align:center;min-height:20px"></div>
      </div>

      <div class="card instructions-card">
        <div class="card-label">Additional Instructions <span class="optional-tag">optional</span></div>
        <p class="instructions-hint">Summary and transcription will always be generated. Add any extra requests below:</p>
        <textarea id="instructions" class="instructions-input" rows="2" placeholder="e.g. translate, total all numbers, provide action item detail, ..."></textarea>
      </div>

      <button class="btn-primary" id="scan-btn" disabled>Scan Notes</button>
      <div class="loading" id="loading">
        <span class="spinner"></span>Reading your notes…
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <svg hidden xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-folder-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      <polyline points="22 10 12 10 12 17"/>
    </symbol>
    <symbol id="icon-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </symbol>
    <symbol id="icon-library" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </symbol>
    <symbol id="icon-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </symbol>
  </svg>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Z2xhZC1jbGFtLTQyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://glad-clam-42.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="app.js?v=23"></script>
</body>
</html>
