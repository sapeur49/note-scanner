<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadWrite — Nifty Little Scanner</title>
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="logo">Read<span>Write</span></a>
      <div class="tagline">nifty little scanner</div>
    </header>

    <!-- Sign-in wall -->
    <div id="sign-in-wall" hidden>
      <div id="clerk-sign-in"></div>
    </div>

    <!-- App (shown when signed in) -->
    <div id="app" hidden>
      <div class="user-row">
        <span id="user-email" class="user-email"></span>
        <button class="btn-signout" id="btn-signout">Sign out</button>
      </div>

      <div class="card">
        <div class="card-label">Notes &amp; Documents</div>
        <div class="upload-zone" id="drop-zone">
          <div class="upload-icon">📋</div>
          <p>Drag &amp; drop images or PDFs here, or use buttons below</p>
          <p style="margin-top:4px"><strong>Multiple files supported</strong></p>
          <div class="input-buttons">
            <button class="btn-outline" id="btn-files">📁 Choose Files</button>
            <button class="btn-outline" id="btn-camera">📷 Camera</button>
          </div>
        </div>
        <input type="file" id="file-input" accept="image/*,application/pdf" multiple hidden>
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <div id="file-count" style="margin-top:10px;font-size:0.875rem;color:var(--text-muted);text-align:center;min-height:20px"></div>
      </div>

      <div class="card instructions-card">
        <div class="card-label">Additional Instructions <span class="optional-tag">optional</span></div>
        <p class="instructions-hint">Summary and transcription will always be generated. Add any extra requests below:</p>
        <textarea id="instructions" class="instructions-input" rows="2" placeholder="e.g. translate, total all numbers, provide action item detail, ..."></textarea>
      </div>

      <button class="btn-primary" id="scan-btn" disabled>Scan Notes</button>
      <div class="loading" id="loading">
        <span class="spinner"></span>Reading your notes…
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Z2xhZC1jbGFtLTQyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://glad-clam-42.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="app.js?v=11"></script>
</body>
</html>
