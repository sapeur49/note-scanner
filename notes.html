<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadWrite — My Notes</title>
  <link rel="stylesheet" href="style.css?v=23">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn" onclick="if(history.length>1){history.back();return false;}">
      <svg class="icon"><use href="#icon-arrow-left"/></svg> Back
    </a>

    <header>
      <a href="index.html" class="logo">Read<span>Write</span></a>
    </header>

    <!-- Sign-in wall -->
    <div id="sign-in-wall" hidden>
      <div id="clerk-sign-in"></div>
    </div>

    <div id="notes-app" hidden>
      <h1 class="page-title">My Notes</h1>
      <input type="search" id="notes-search" class="notes-search" placeholder="Search title, summary, transcription…" autocomplete="off">
      <div id="notes-list" class="notes-list"></div>
      <div id="notes-empty" class="notes-empty" hidden>No saved notes yet. Scan and save one to get started.</div>
    </div>
  </div>

  <svg hidden xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5"/>
      <polyline points="12 19 5 12 12 5"/>
    </symbol>
  </svg>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Z2xhZC1jbGFtLTQyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://glad-clam-42.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="app.js?v=23"></script>
</body>
</html>
